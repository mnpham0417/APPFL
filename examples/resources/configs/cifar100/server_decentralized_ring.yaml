client_configs:
  train_configs:
    # Local trainer: standard SGD — no activation matching or BN reset needed
    trainer: "DecentralizedTrainer"
    mode: "epoch"
    num_local_epochs: 2
    optim: "SGD"
    optim_args:
      lr: 0.01
      momentum: 0.9
      weight_decay: 1.0e-4
    # Loss function
    loss_fn_path: "./resources/loss/celoss.py"
    loss_fn_name: "CELoss"
    # Client validation
    do_validation: True
    do_pre_validation: True
    metric_path: "./resources/metric/acc.py"
    metric_name: "accuracy"
    # Differential privacy
    use_dp: False
    epsilon: 1
    clip_grad: False
    clip_value: 1
    clip_norm: 1
    # Data loader
    train_batch_size: 100
    val_batch_size: 100
    train_data_shuffle: True
    val_data_shuffle: False

  model_configs:
    # ResNet20 from the DIMAT paper (w=8, channels 128/256/512)
    model_path: "./resources/model/resnet20_dimat.py"
    model_name: "ResNet20"
    model_kwargs:
      num_classes: 100

  comm_configs:
    compressor_configs:
      enable_compression: False
      lossy_compressor: "SZ2Compressor"
      lossless_compressor: "blosc"
      error_bounding_mode: "REL"
      error_bound: 1.0e-3
      param_cutoff: 1024

server_configs:
  num_clients: 5
  scheduler: "SyncScheduler"
  scheduler_kwargs:
    same_init_model: True
  aggregator: "DecentralizedAggregator"
  aggregator_kwargs:
    # Ring topology: each agent averages with 2 adjacent neighbors (weight 1/3)
    topology: "ring"
    # Equal mixing weights (standard decentralized SGD)
    client_weights_mode: "equal"
    device: "cpu"
  num_global_epochs: 200
  logging_output_dirname: "./output"
  logging_output_filename: "result_decentralized_ring"
  comm_configs:
    grpc_configs:
      server_uri: localhost:50051
      max_message_size: 1048576
      use_ssl: False
