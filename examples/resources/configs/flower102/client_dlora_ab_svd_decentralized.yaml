client_id: "Client1"
train_configs:
  device: "cuda"
  logging_output_dirname: "./output"
  logging_output_filename: "result_flower102_dlora_ab_svd_decentralized"

# Flowers-102 dataset loader using clip_lora's dataset infrastructure
# (provides .classnames and .template attributes for CLIPLoRATrainer)
data_configs:
  dataset_path: "./resources/dataset/flower102_clip_lora_dataset.py"
  dataset_name: "get_flower102_clip_lora"
  dataset_kwargs:
    # Root directory of the Flower102 dataset
    # (should contain jpg/ and split_zhou_OxfordFlowers.json)
    data_path: "/work/mech-ai-scratch/nsaadati/projects/dlora/others/CLIP-LoRA/data/Flower102"
    backbone: "ViT-B/16"        # must match model_kwargs.backbone
    shots: 16                    # few-shot samples per class
    num_clients: 5               # overridden by the MPI script
    client_id: 0                 # overridden per client by the MPI script
    data_dist: "iid"             # "iid" or "non-iid"
    seed: 1
    # Set clip_lora_root to the absolute path of your clip_lora directory:
    clip_lora_root: null         # e.g. "/path/to/clip_lora"

comm_configs:
  grpc_configs:
    server_uri: localhost:50051
    max_message_size: 1048576
    use_ssl: False
