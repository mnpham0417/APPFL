client_id: "Client1"
train_configs:
  device: "cuda"
  logging_output_dirname: "./output"
  logging_output_filename: "result_decaf_fedavg"

# Dataset configuration.
# Change dataset_name to switch datasets — no other code changes needed.
#
# Supported clip_benchmarks (require raw data at root_path):
#   oxford_flowers, oxford_pets, caltech101, dtd, eurosat, fgvc,
#   food101, stanford_cars, sun397, ucf101, imagenet
#
# Supported torchvision datasets (downloaded automatically to root_path):
#   cifar10, cifar100, mnist, stl10
#
# shots:     few-shot examples per class; 0 or null = full dataset.
# data_dist: "iid" (class-balanced split) or "non-iid" (exclusive classes).
data_configs:
  dataset_path: "./resources/dataset/decaf_dataset.py"
  dataset_name: "get_decaf_dataset"
  dataset_kwargs:
    dataset_name: "oxford_flowers"   # swap to any supported dataset
    root_path: null                  # path to dataset root; set before running
    shots: 16                        # few-shot per class (0 = full dataset)
    backbone: "ViT-B/16"             # must match model_configs.model_kwargs.backbone
    data_dist: "iid"                 # "iid" or "non-iid"
    num_clients: 5                   # overridden by the MPI script
    client_id: 0                     # overridden per client by the MPI script
    seed: 1

comm_configs:
  grpc_configs:
    server_uri: localhost:50051
    max_message_size: 1048576
    use_ssl: False
