client_id: "Client1"
train_configs:
  device: "cuda"
  logging_output_dirname: "./output"
  logging_output_filename: "result_decaf_cifar100"

data_configs:
  dataset_path: "./resources/dataset/decaf_general_dataset.py"
  dataset_name: "get_decaf_general_dataset"
  dataset_kwargs:
    dataset_name: "cifar100"
    root_path: "./datasets/RawData"
    backbone: "ViT-B/16"
    shots: 40         # few-shot samples per class (overridden via --shots)
    data_dist: "iid"  # "iid" or "non-iid"
    num_clients: 5    # overridden by MPI script
    client_id: 0      # overridden by MPI script
    seed: 1

comm_configs:
  grpc_configs:
    server_uri: localhost:50051
    max_message_size: 1048576
    use_ssl: False
