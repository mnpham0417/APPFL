client_configs:
  train_configs:
    trainer: "DeCaFTrainer"
    mode: "step"
    num_local_steps: 50
    encoder: "both"
    freeze_a: False
    lr: 2.0e-4
    weight_decay: 1.0e-2
    logit_scale: 100.0
    train_batch_size: 32
    val_batch_size: 64
    train_data_shuffle: True
    val_data_shuffle: False
    do_validation: True
    do_pre_validation: False
    device: "cuda"

  model_configs:
    model_path: "./resources/model/decaf_model.py"
    model_name: "DeCaFModel"
    model_kwargs:
      backbone: "ViT-B/16"
      encoder: "both"
      position: "all"
      params: ["q", "k", "v"]
      r: 4
      alpha: 1
      dropout_rate: 0.25

  comm_configs:
    compressor_configs:
      enable_compression: False
      lossy_compressor: "SZ2Compressor"
      lossless_compressor: "blosc"
      error_bounding_mode: "REL"
      error_bound: 1.0e-3
      param_cutoff: 1024

server_configs:
  num_clients: 5
  scheduler: "SyncScheduler"
  scheduler_kwargs:
    same_init_model: True
  aggregator: "DecentralizedDLoRABSVDAggregator"
  aggregator_kwargs:
    lora_rank: 4
    client_weights_mode: "sample_size"
    device: "cpu"
  num_global_epochs: 300
  logging_output_dirname: "./output"
  logging_output_filename: "result_decaf_cifar100"
  comm_configs:
    grpc_configs:
      server_uri: localhost:50051
      max_message_size: 1048576
      use_ssl: False
